# Taeglicher Lauf: baut die Zeitung nachts in der GitHub-Cloud und
# veroeffentlicht sie auf GitHub Pages. Der Kindle holt sie morgens per
# OPDS-Katalog (KOReader) ab.
#
# Einmalig noetig, bevor das funktioniert:
#   1. In den Repo-Einstellungen unter "Settings -> Secrets and variables ->
#      Actions" ein Secret namens OPENROUTER_API_KEY mit deinem Schluessel anlegen.
#   2. Unter "Settings -> Pages" als Quelle "GitHub Actions" auswaehlen.

name: Taegliche Zeitung

on:
  schedule:
    # 03:23 UTC = 05:23 dt. Sommerzeit / 04:23 Winterzeit.
    # Bewusst FRUEH und zu einer "krummen" Minute: GitHub verzoegert
    # geplante Laeufe zu vollen Stunden oft um 1-3 Stunden (Stosszeit).
    # So ist die Zeitung auch mit Verzoegerung vor dem Fruehstueck da.
    - cron: "23 3 * * *"
  workflow_dispatch:          # erlaubt manuelles Starten per Knopfdruck

# Rechte, die der Pages-Deploy braucht
permissions:
  contents: read
  pages: write
  id-token: write

# Verhindert, dass sich zwei Laeufe ins Gehege kommen
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Pakete installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Chromium fuer Playwright laden
        run: python -m playwright install --with-deps chromium

      - name: Zeitung bauen (News + Wetter + KI -> PDF)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python src/main.py

      - name: Veroeffentlichungs-Ordner (site/) bauen
        run: python src/build_site.py

      - name: site/ als Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages veroeffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
